name: Company Service CI

on:
  push:
  pull_request:

jobs:
  test-company:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Give permission to mvnw
        run: chmod +x company/mvnw

      - name: Start Spring Boot app (TEST PROFILE)
        run: |
          cd company
          chmod +x mvnw
          nohup ./mvnw spring-boot:run -Dspring.profiles.active=test > app.log 2>&1 &
          echo "Waiting for app to start..."
          sleep 25

      - name: Run company tests
        run: |
          cd company
          ./mvnw clean test

      - name: Print app logs (for debugging)
        if: failure()
        run: cat company/app.log
